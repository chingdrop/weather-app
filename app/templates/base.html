<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weather App{% if title %} — {{ title }}{% endif %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6; color: #111827; line-height: 1.5; }

    nav { background: #1e293b; color: #f8fafc; padding: 0 1.5rem; height: 52px; display: flex; align-items: center; gap: 1.5rem; }
    nav .brand { font-weight: 600; font-size: 1rem; color: #f8fafc; text-decoration: none; }
    nav a { color: #94a3b8; text-decoration: none; font-size: 0.875rem; }
    nav a:hover { color: #f8fafc; }
    nav .spacer { flex: 1; }

    main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.35rem; font-weight: 600; margin-bottom: 1.5rem; }
    h2 { font-size: 0.95rem; font-weight: 600; color: #4b5563; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.04em; }

    .card { background: #fff; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .card-header h1 { margin-bottom: 0; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid #e5e7eb; font-size: 0.8rem; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 0.65rem 0.75rem; border-bottom: 1px solid #f3f4f6; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }

    .btn { display: inline-block; padding: 0.4rem 0.9rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 500; text-decoration: none; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .btn-warning { background: #d97706; color: #fff; }
    .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.8rem; }
    .btn-group { display: flex; gap: 0.5rem; }

    .flash { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1.25rem; font-size: 0.9rem; }
    .flash-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .flash-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    label { display: block; font-size: 0.85rem; font-weight: 500; color: #374151; margin-bottom: 0.3rem; }
    input[type=text], input[type=number], input[type=password] {
      width: 100%; padding: 0.45rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 0.9rem; background: #fff; color: #111827;
    }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .field { margin-bottom: 1.1rem; }
    .hint { font-size: 0.78rem; color: #6b7280; margin-top: 0.25rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    .form-actions { display: flex; gap: 0.75rem; align-items: center; margin-top: 1.5rem; }

    .section-divider { border: none; border-top: 1px solid #e5e7eb; margin: 1.5rem 0; }
    .text-muted { color: #6b7280; font-size: 0.85rem; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 500; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }

    /* Restart overlay */
    #restart-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.7); z-index: 9999; align-items: center; justify-content: center; }
    #restart-overlay.active { display: flex; }
    .overlay-box { background: #fff; border-radius: 12px; padding: 2.5rem 3rem; text-align: center; }
    .overlay-box p { color: #374151; font-size: 0.95rem; margin-top: 0.75rem; }
    .spinner { width: 44px; height: 44px; border: 4px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin .75s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <a class="brand" href="/">☁ Weather App</a>
  <a href="/config/locations">Locations</a>
  <a href="/config/settings">Settings</a>
</nav>

<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

<div id="restart-overlay">
  <div class="overlay-box">
    <div class="spinner"></div>
    <p>Restarting, please wait…</p>
  </div>
</div>

<script>
function triggerRestart() {
  document.getElementById('restart-overlay').classList.add('active');
  fetch('/restart', { method: 'POST' }).catch(() => {});
  const poll = setInterval(async () => {
    try {
      const r = await fetch('/health');
      if (r.ok) { clearInterval(poll); location.reload(); }
    } catch (_) {}
  }, 1000);
}
</script>

</body>
</html>
