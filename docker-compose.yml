services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    command: serve
    restart: unless-stopped
    environment:
      TZ: America/New_York
    volumes:
      - ./ntfy/cache:/var/cache/ntfy
      - ./ntfy/etc:/etc/ntfy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O - http://localhost:80/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  weather-app:
    build: .
    container_name: weather-app
    restart: unless-stopped
    env_file: .env
    environment:
      NTFY_BASE_URL: http://ntfy
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      ntfy:
        condition: service_healthy